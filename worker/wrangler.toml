# cofounder-relay WhatsApp hub — Cloudflare Worker.
# Deploy:  cd worker && npx wrangler deploy
# Set secrets after deploy (never commit them):
#   npx wrangler secret put HUB_TOKEN
#   npx wrangler secret put META_TOKEN        # (meta)   or  TW_SID / TW_TOKEN (twilio)
#   npx wrangler secret put META_VERIFY_TOKEN # (meta)
# Set vars (non-secret) in the dashboard or here:  PROVIDER, ROOMS, META_PHONE_ID, TW_FROM
name = "cofounder-relay-wa-hub"
main = "whatsapp-hub.js"
compatibility_date = "2026-01-01"

# Message store. Create with:  npx wrangler kv namespace create MESSAGES
# then paste the id below.
# [[kv_namespaces]]
# binding = "MESSAGES"
# id = "<paste-kv-namespace-id>"

[vars]
PROVIDER = "twilio"          # "twilio" (fastest sandbox) or "meta"
# ROOMS is set as a plaintext var (JSON string), e.g. via the dashboard:
# ROOMS = '{"steady-imports":{"participants":[{"number":"+15551234567","identity":"Edward"},{"number":"+15557654321","identity":"David"}]}}'
# TW_FROM = "whatsapp:+14155238886"   # Twilio sandbox number
# META_PHONE_ID = "<meta-phone-number-id>"
